<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oups ! Quelque chose cloche...</title>
    <style>
        /* CSS : Style général et animation du poisson */
        body {
            margin: 0;
            padding: 0;
            background-color: #e0f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Empêche le scroll pendant la blague */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #006064;
        }

        .container {
            text-align: center;
            z-index: 1;
        }

        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; }

        /* Le Poisson */
        #poisson {
            position: absolute;
            width: 80px;
            height: 50px;
            background: #ff9800;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            pointer-events: none; /* Ne bloque pas les clics */
            transition: transform 0.1s ease-out;
            z-index: 1000;
        }

        /* Queue du poisson */
        #poisson::after {
            content: '';
            position: absolute;
            right: -20px;
            top: 10px;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 25px solid #ff9800;
        }

        /* Œil du poisson */
        #poisson::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 10px;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
        }

        .bulles {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
            animation: monter 3s infinite ease-in;
        }

        @keyframes monter {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>404 - Site Submergé</h1>
        <p>Désolé, un banc de poissons a envahi nos serveurs.</p>
        <p><strong>Poisson d'avril ! 🐟</strong></p>
    </div>

    <div id="poisson"></div>

    <script>
        // JS : Suivi de la souris et création de bulles
        const poisson = document.getElementById('poisson');
        let mouseX = 0;
        let mouseY = 0;
        let posX = 0;
        let posY = 0;

        // Suivi fluide (interpolation)
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animate() {
            // Calcul de la distance pour un mouvement fluide
            posX += (mouseX - posX - 40) * 0.1;
            posY += (mouseY - posY - 25) * 0.1;

            poisson.style.left = posX + 'px';
            poisson.style.top = posY + 'px';

            // Oriente le poisson vers la direction de la souris
            if (mouseX > posX + 40) {
                poisson.style.transform = 'scaleX(1)';
            } else {
                poisson.style.transform = 'scaleX(-1)';
            }

            requestAnimationFrame(animate);
        }
        animate();

        // Générateur de bulles aléatoires
        function creerBulle() {
            const bulle = document.createElement('div');
            bulle.className = 'bulles';
            const taille = Math.random() * 20 + 10 + 'px';
            bulle.style.width = taille;
            bulle.style.height = taille;
            bulle.style.left = Math.random() * 100 + 'vw';
            bulle.style.bottom = "-50px";
            
            document.body.appendChild(bulle);

            setTimeout(() => {
                bulle.remove();
            }, 3000);
        }

        setInterval(creerBulle, 300);
    </script>
</body>
</html>
